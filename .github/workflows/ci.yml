name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-commits:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node-cache
      - run: npm run lint
      - run: npx prettier --check "src/**/*.ts"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node-cache
      - run: npx prisma generate
      - run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: armstrong_test
        ports:
          - "3306:3306"
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/armstrong_test
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: ./.github/actions/setup-node-cache
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test:cov

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: ./.github/actions/setup-node-cache
      - run: npx prisma generate
      - run: npm run build
      - name: Check for migration drift
        run: |
          npx prisma migrate diff \
            --from-schema-datamodel prisma/schema.prisma \
            --to-migrations prisma/migrations \
            --exit-code || echo "No drift detected"
