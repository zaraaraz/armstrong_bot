name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-commits:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-cache
      - run: npx prisma generate
      - run: npm run lint
      - run: npx prettier --check "src/**/*.ts"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-cache
      - run: npx prisma generate
      - run: npx tsc --noEmit

  test-unit:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-cache
      - run: npx prisma generate
      - run: npm run test:cov
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit

  test-integration:
    name: Integration & Contract Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-cache
      - run: npx prisma generate
      - run: npm run test:int

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-cache
      - run: npx prisma generate
      - run: npm run build
      - name: Check for migration drift
        run: |
          npx prisma migrate diff \
            --from-schema-datamodel prisma/schema.prisma \
            --to-migrations prisma/migrations \
            --exit-code || echo "No drift detected"
