name: Deploy

# On every push to main: build the production image, push it to GHCR, then
# SSH into the server and roll the stack forward (pull image, run migrations,
# restart the app). Idempotent and safe to re-run.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /srv/bots/armstrong

      - name: Pull image, migrate, restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/bots/armstrong
            # GHCR image is public, but log in anyway to raise pull rate limits.
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true
            # Merge compose vars (.deploy.env) so DB_PASSWORD / APP_IMAGE resolve.
            set -a; . ./.deploy.env; set +a
            export APP_IMAGE="ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"
            docker compose -f docker-compose.prod.yml --env-file .deploy.env pull
            docker compose -f docker-compose.prod.yml --env-file .deploy.env up -d --remove-orphans
            docker image prune -f
            echo "waiting for app health..."
            for i in $(seq 1 20); do
              status=$(docker inspect --format '{{.State.Health.Status}}' armstrong-app 2>/dev/null || echo starting)
              [ "$status" = healthy ] && { echo "app healthy"; exit 0; }
              sleep 5
            done
            echo "app did not become healthy in time"; docker compose -f docker-compose.prod.yml logs app --tail 40; exit 1
